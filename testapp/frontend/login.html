<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – TaskApp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    h1 { font-size: 1.6rem; color: #0f3460; margin-bottom: 6px; }
    p.sub { font-size: .85rem; color: #666; margin-bottom: 24px; }
    label { display: block; font-size: .85rem; font-weight: 600; color: #333; margin-bottom: 4px; }
    input {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #d0d0d0; border-radius: 8px;
      font-size: .95rem; outline: none; transition: border .2s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #0f3460; }
    button {
      width: 100%; padding: 11px;
      background: #0f3460; color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #16213e; }
    .msg { margin-top: 14px; text-align: center; font-size: .88rem; }
    .msg.err  { color: #c0392b; }
    .msg.ok   { color: #27ae60; }
    .link-row { margin-top: 18px; text-align: center; font-size: .85rem; color: #555; }
    .link-row a { color: #0f3460; font-weight: 600; text-decoration: none; }
    .link-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your TaskApp account</p>

  <form id="loginForm">
    <label for="username">Username</label>
    <input id="username" type="text" placeholder="Enter username" required autocomplete="username"/>

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter password" required autocomplete="current-password"/>

    <button type="submit">Sign In</button>
  </form>

  <div id="msg" class="msg"></div>

  <div class="link-row">
    Don't have an account? <a href="/register.html">Register</a>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('jwt')) window.location.href = '/dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('msg');
    msg.textContent = '';
    msg.className   = 'msg';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        msg.textContent = data.error || 'Login failed.';
        msg.className   = 'msg err';
        return;
      }

      localStorage.setItem('jwt',      data.token);
      localStorage.setItem('username', data.username);
      localStorage.setItem('role',     data.role);
      window.location.href = '/dashboard.html';
    } catch (err) {
      msg.textContent = 'Network error. Is the server running?';
      msg.className   = 'msg err';
    }
  });
</script>
</body>
</html>
