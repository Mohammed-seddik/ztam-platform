<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In Redirect – TaskApp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    h1 { font-size: 1.6rem; color: #0f3460; margin-bottom: 6px; }
    p.sub { font-size: .85rem; color: #666; margin-bottom: 24px; }
    label { display: block; font-size: .85rem; font-weight: 600; color: #333; margin-bottom: 4px; }
    input {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #d0d0d0; border-radius: 8px;
      font-size: .95rem; outline: none; transition: border .2s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #0f3460; }
    button {
      width: 100%; padding: 11px;
      background: #0f3460; color: #fff;
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #16213e; }
    .msg { margin-top: 14px; text-align: center; font-size: .88rem; }
    .msg.err  { color: #c0392b; }
    .msg.ok   { color: #27ae60; }
    .link-row { margin-top: 18px; text-align: center; font-size: .85rem; color: #555; }
    .link-row a { color: #0f3460; font-weight: 600; text-decoration: none; }
    .link-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <h1>Sign in through ZTAM</h1>
  <p class="sub">This application now uses the platform-owned Zero Trust login.</p>

  <button id="continueBtn" type="button">Continue to Secure Sign In</button>

  <div id="msg" class="msg">Redirecting…</div>
</div>

<script>
  const secureLoginUrl = `/ztam/login?next=${encodeURIComponent('/dashboard.html')}`;

  document.getElementById('continueBtn').addEventListener('click', () => {
    window.location.href = secureLoginUrl;
  });

  window.location.replace(secureLoginUrl);
</script>
</body>
</html>
