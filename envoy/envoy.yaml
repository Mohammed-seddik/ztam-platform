static_resources:
  listeners:
    # ── HTTP listener: redirect all traffic to HTTPS ──────────────────────
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: redirect_http
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: redirect_route
                  virtual_hosts:
                    - name: redirect
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          redirect:
                            https_redirect: true
                            port_redirect: 443

    # ── HTTPS listener: TLS termination + all application routes ──────────
    - name: listener_https
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8443
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain:
                      filename: /etc/envoy/certs/server.crt
                    private_key:
                      filename: /etc/envoy/certs/server.key
                tls_params:
                  tls_minimum_protocol_version: TLSv1_2
                  tls_maximum_protocol_version: TLSv1_3
                  cipher_suites:
                    - ECDHE-ECDSA-AES256-GCM-SHA384
                    - ECDHE-RSA-AES256-GCM-SHA384
                    - ECDHE-ECDSA-CHACHA20-POLY1305
                    - ECDHE-RSA-CHACHA20-POLY1305
                    - ECDHE-ECDSA-AES128-GCM-SHA256
                    - ECDHE-RSA-AES128-GCM-SHA256
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_https
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                http_filters:
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      failure_mode_allow: false
                      transport_api_version: V3
                      http_service:
                        server_uri:
                          uri: http://auth-middleware:8001
                          cluster: auth_middleware_cluster
                          timeout: 5s
                        path_prefix: ""
                        authorization_request:
                          allowed_headers:
                            patterns:
                              - exact: authorization
                              - exact: x-device-id
                              - exact: x-forwarded-for
                              - exact: host
                        authorization_response:
                          allowed_upstream_headers:
                            patterns:
                              - exact: x-user-id
                              - exact: x-user-roles
                              - exact: x-tenant-id
                              - exact: authorization
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: local_route
                  virtual_hosts:
                    # __ZTAM_TENANT_ROUTES__ (do not remove — used by onboard-tenant.sh)
                    - name: backend
                      domains: ["*"]
                      # ── Security response headers (applied to every response) ──
                      response_headers_to_add:
                        - header:
                            key: Strict-Transport-Security
                            value: "max-age=63072000; includeSubDomains; preload"
                          keep_empty_value: false
                        - header:
                            key: X-Content-Type-Options
                            value: "nosniff"
                        - header:
                            key: X-Frame-Options
                            value: "SAMEORIGIN"
                        - header:
                            key: Referrer-Policy
                            value: "strict-origin-when-cross-origin"
                        - header:
                            key: Permissions-Policy
                            value: "geolocation=(), microphone=(), camera=(), payment=()"
                        - header:
                            key: Content-Security-Policy
                            value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'"
                        - header:
                            key: Cache-Control
                            value: "no-store"
                      routes:
                        # ── Frontend HTML pages: pass through, no auth needed ──
                        - match:
                            path: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 5s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            path: "/login.html"
                          route:
                            cluster: backend_cluster
                            timeout: 5s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: "/dashboard.html"
                          route:
                            cluster: backend_cluster
                            timeout: 5s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: "/register.html"
                          route:
                            cluster: backend_cluster
                            timeout: 5s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        # ── Login: bypass ext_authz, proxy to auth-middleware
                        #    which calls Keycloak and returns a signed JWT
                        - match:
                            path: "/api/auth/login"
                          route:
                            cluster: auth_middleware_cluster
                            prefix_rewrite: "/login-proxy"
                            timeout: 10s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        # ── Register: pass through directly (no auth needed)
                        - match:
                            path: "/api/auth/register"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        # ── Everything else: enforce Keycloak JWT via ext_authz
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 30s

  clusters:
    - name: auth_middleware_cluster
      connect_timeout: 2s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: auth_middleware_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: auth-middleware
                      port_value: 8001

    - name: backend_cluster
      connect_timeout: 1s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: testapp
                      port_value: 3000
    # __ZTAM_TENANT_CLUSTERS__ (do not remove — used by onboard-tenant.sh)
