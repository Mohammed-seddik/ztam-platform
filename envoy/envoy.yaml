static_resources:
  listeners:
    - name: http_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: redirect_all
                  virtual_hosts:
                    - name: local_redirect
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          redirect:
                            https_redirect: true
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    - name: https_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 443
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                  - certificate_chain: { filename: "/etc/envoy/certs/localhost.crt" }
                    private_key: { filename: "/etc/envoy/certs/localhost.key" }
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_https
                request_headers_to_remove:
                  - x-user-id
                  - x-user-roles
                  - x-user-email
                  - x-tenant-id
                  - x-ztam-jwt
                route_config:
                  name: local_route
                  virtual_hosts:
                    # __ZTAM_TENANT_ROUTES_BEGIN__ (generated by tenant_manager.py)
                    # ── Tenant: taskpro (keycloak mode) ────────────────────
                    - name: taskpro_vhost
                      domains: ["app.taskpro.com"]
                      response_headers_to_add:
                        - header:
                            key: Strict-Transport-Security
                            value: "max-age=63072000; includeSubDomains; preload"
                        - header:
                            key: X-Content-Type-Options
                            value: "nosniff"
                        - header:
                            key: X-Frame-Options
                            value: "SAMEORIGIN"
                        - header:
                            key: Referrer-Policy
                            value: "strict-origin-when-cross-origin"
                        - header:
                            key: Content-Security-Policy
                            value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'"
                        - header:
                            key: Permissions-Policy
                            value: "geolocation=(), microphone=(), camera=(), payment=()"
                        - header:
                            key: Cache-Control
                            value: "no-store"
                      routes:
                        - match:
                            prefix: "/ztam/"
                          route:
                            cluster: auth_middleware_cluster
                            timeout: 10s
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-ztam-internal-auth
                                value: "%ENVIRONMENT(ENVOY_AUTH_SHARED_SECRET)%"
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            path: "/api/auth/login"
                          route:
                            cluster: auth_middleware_cluster
                            prefix_rewrite: "/login-proxy"
                            timeout: 10s
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-ztam-internal-auth
                                value: "%ENVIRONMENT(ENVOY_AUTH_SHARED_SECRET)%"
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            path: "/api/auth/logout"
                          route:
                            cluster: auth_middleware_cluster
                            prefix_rewrite: "/logout"
                            timeout: 10s
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-ztam-internal-auth
                                value: "%ENVIRONMENT(ENVOY_AUTH_SHARED_SECRET)%"
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: "/static/"
                          route:
                            cluster: taskpro_cluster
                            host_rewrite_literal: "app"
                            timeout: 10s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: "/"
                          route:
                            cluster: taskpro_cluster
                            host_rewrite_literal: "app"
                            timeout: 30s
                    # ── Tenant: testapp (keycloak mode) ────────────────────
                    - name: testapp_vhost
                      domains: ["localhost"]
                      response_headers_to_add:
                        - header:
                            key: Strict-Transport-Security
                            value: "max-age=63072000; includeSubDomains; preload"
                        - header:
                            key: X-Content-Type-Options
                            value: "nosniff"
                        - header:
                            key: X-Frame-Options
                            value: "SAMEORIGIN"
                        - header:
                            key: Referrer-Policy
                            value: "strict-origin-when-cross-origin"
                        - header:
                            key: Content-Security-Policy
                            value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'"
                        - header:
                            key: Permissions-Policy
                            value: "geolocation=(), microphone=(), camera=(), payment=()"
                        - header:
                            key: Cache-Control
                            value: "no-store"
                      routes:
                        - match:
                            prefix: "/ztam/"
                          route:
                            cluster: auth_middleware_cluster
                            timeout: 10s
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-ztam-internal-auth
                                value: "%ENVIRONMENT(ENVOY_AUTH_SHARED_SECRET)%"
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            path: "/api/auth/login"
                          route:
                            cluster: auth_middleware_cluster
                            prefix_rewrite: "/login-proxy"
                            timeout: 10s
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-ztam-internal-auth
                                value: "%ENVIRONMENT(ENVOY_AUTH_SHARED_SECRET)%"
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            path: "/api/auth/logout"
                          route:
                            cluster: auth_middleware_cluster
                            prefix_rewrite: "/logout"
                            timeout: 10s
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-ztam-internal-auth
                                value: "%ENVIRONMENT(ENVOY_AUTH_SHARED_SECRET)%"
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: "/static/"
                          route:
                            cluster: testapp_cluster
                            host_rewrite_literal: "testapp"
                            timeout: 10s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: "/"
                          route:
                            cluster: testapp_cluster
                            host_rewrite_literal: "testapp"
                            timeout: 30s
                    # ── Tenant: testapp2 (keycloak mode) ────────────────────
                    - name: testapp2_vhost
                      domains: ["testapp2.localhost"]
                      response_headers_to_add:
                        - header:
                            key: Strict-Transport-Security
                            value: "max-age=63072000; includeSubDomains; preload"
                        - header:
                            key: X-Content-Type-Options
                            value: "nosniff"
                        - header:
                            key: X-Frame-Options
                            value: "SAMEORIGIN"
                        - header:
                            key: Referrer-Policy
                            value: "strict-origin-when-cross-origin"
                        - header:
                            key: Content-Security-Policy
                            value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'"
                        - header:
                            key: Permissions-Policy
                            value: "geolocation=(), microphone=(), camera=(), payment=()"
                        - header:
                            key: Cache-Control
                            value: "no-store"
                      routes:
                        - match:
                            prefix: "/ztam/"
                          route:
                            cluster: auth_middleware_cluster
                            timeout: 10s
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-ztam-internal-auth
                                value: "%ENVIRONMENT(ENVOY_AUTH_SHARED_SECRET)%"
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            path: "/api/auth/login"
                          route:
                            cluster: auth_middleware_cluster
                            prefix_rewrite: "/login-proxy"
                            timeout: 10s
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-ztam-internal-auth
                                value: "%ENVIRONMENT(ENVOY_AUTH_SHARED_SECRET)%"
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            path: "/api/auth/logout"
                          route:
                            cluster: auth_middleware_cluster
                            prefix_rewrite: "/logout"
                            timeout: 10s
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-ztam-internal-auth
                                value: "%ENVIRONMENT(ENVOY_AUTH_SHARED_SECRET)%"
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: "/static/"
                          route:
                            cluster: testapp2_cluster
                            host_rewrite_literal: "testapp2"
                            timeout: 10s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: "/"
                          route:
                            cluster: testapp2_cluster
                            host_rewrite_literal: "testapp2"
                            timeout: 30s
                    # __ZTAM_TENANT_ROUTES_END__ (generated by tenant_manager.py)
                    - name: client_app
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: client_app
                            timeout: 30s
                http_filters:
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      grpc_service:
                        envoy_grpc:
                          cluster_name: auth_middleware_cluster
                      transport_api_version: V3
                      status_on_error:
                        code: ServiceUnavailable
                      with_request_body:
                        max_request_bytes: 8192
                        allow_partial_message: true
                      include_peer_certificate: true
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: auth_middleware_cluster
      type: STRICT_DNS
      connect_timeout: 0.25s
      http2_protocol_options: {}
      load_assignment:
        cluster_name: auth_middleware_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: auth-middleware
                      port_value: 8001
    
    - name: client_app
      type: STRICT_DNS
      connect_timeout: 1s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: client_app
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: client-app
                      port_value: 3000

    # __ZTAM_TENANT_CLUSTERS_BEGIN__ (generated by tenant_manager.py)
    # ── Tenant: taskpro ─────────────────────────────────────────────────────
    - name: taskpro_cluster
      connect_timeout: 10s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: taskpro_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: app
                      port_value: 3001
    # ── Tenant: testapp ─────────────────────────────────────────────────────
    - name: testapp_cluster
      connect_timeout: 10s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: testapp_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: testapp
                      port_value: 3000
    # ── Tenant: testapp2 ─────────────────────────────────────────────────────
    - name: testapp2_cluster
      connect_timeout: 10s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: testapp2_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: testapp2
                      port_value: 3001
# __ZTAM_TENANT_CLUSTERS_END__ (generated by tenant_manager.py)

admin:
  access_log_path: /tmp/admin_access.log
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901
