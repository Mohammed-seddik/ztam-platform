static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                http_filters:
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      failure_mode_allow: false
                      transport_api_version: V3
                      http_service:
                        server_uri:
                          uri: http://auth-middleware:8001
                          cluster: auth_middleware_cluster
                          timeout: 5s
                        path_prefix: ""
                        authorization_request:
                          allowed_headers:
                            patterns:
                              - exact: authorization
                              - exact: x-device-id
                              - exact: x-forwarded-for
                              - exact: host
                        authorization_response:
                          allowed_upstream_headers:
                            patterns:
                              - exact: x-user-id
                              - exact: x-user-roles
                              - exact: x-tenant-id
                              - exact: authorization
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        # ── Frontend HTML pages: pass through, no auth needed ──
                        - match:
                            path: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 5s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            path: "/login.html"
                          route:
                            cluster: backend_cluster
                            timeout: 5s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: "/dashboard.html"
                          route:
                            cluster: backend_cluster
                            timeout: 5s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: "/register.html"
                          route:
                            cluster: backend_cluster
                            timeout: 5s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        # ── Login: bypass ext_authz, proxy to auth-middleware
                        #    which calls Keycloak and returns a TestApp-compatible token
                        - match:
                            path: "/api/auth/login"
                          route:
                            cluster: auth_middleware_cluster
                            prefix_rewrite: "/login-proxy"
                            timeout: 10s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        # ── Register: pass through directly (no auth needed)
                        - match:
                            path: "/api/auth/register"
                          route:
                            cluster: backend_cluster
                            timeout: 10s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        # ── Last session: proxy to auth-middleware (validates token internally)
                        - match:
                            path: "/api/sessions/last"
                          route:
                            cluster: auth_middleware_cluster
                            prefix_rewrite: "/sessions/last"
                            timeout: 10s
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        # ── Everything else: enforce Keycloak JWT via ext_authz
                        - match:
                            prefix: "/"
                          route:
                            cluster: backend_cluster
                            timeout: 30s

  clusters:
    - name: auth_middleware_cluster
      connect_timeout: 2s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: auth_middleware_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: auth-middleware
                      port_value: 8001

    - name: backend_cluster
      connect_timeout: 1s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: backend_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: testapp
                      port_value: 3000
