services:

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks: [ztam]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${PG_PASS}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [ztam]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: >
      start
      --db=postgres
      --db-url=jdbc:postgresql://postgres:5432/keycloak
      --db-username=keycloak
      --db-password=${PG_PASS}
      --hostname=${KC_HOSTNAME:-localhost}
      --hostname-strict=false
      --http-enabled=true
    volumes:
      - ./keycloak-db-spi/target/keycloak-db-spi.jar:/opt/keycloak/providers/keycloak-db-spi.jar
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASS}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
    # Admin console — bound to localhost only. Use SSH tunnel or firewall for remote access.
    ports:
      - "127.0.0.1:8080:8080"
    networks: [ztam]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  opa:
    image: openpolicyagent/opa:0.64.1
    command: run --server --addr 0.0.0.0:8181 --watch /policies --ignore '*_test.rego'
    volumes:
      - ./policies:/policies:ro
    # No external port: OPA is reachable only from auth-middleware on the internal network.
    # Exposing OPA externally would allow anyone to query the policy engine.
    networks: [ztam]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opa", "eval", "--fail-defined", "data.authz"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-middleware:
    build: ./services/auth-middleware
    volumes:
      - ./tenants:/app/tenants:ro
      - ./platform/published:/app/platform/published:ro
      - ./services/auth-middleware:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      # KC_ISSUER_URL: the public-facing URL Keycloak stamps in JWT iss claims.
      # Must match KC_HOSTNAME in the keycloak service (defaults to localhost).
      KC_ISSUER_URL: ${KC_ISSUER_URL:-http://localhost:8080}
      KC_REALM: ${KC_REALM}
      KC_CLIENT_ID: ${KC_CLIENT_ID:-test-app}
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET}
      OPA_URL: http://opa:8181
      TESTAPP_JWT_SECRET: ${TESTAPP_JWT_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVOY_AUTH_SHARED_SECRET: ${ENVOY_AUTH_SHARED_SECRET}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-5}
      OPA_TIMEOUT_SECONDS: ${OPA_TIMEOUT_SECONDS:-2}
      HTTP_RETRY_ATTEMPTS: ${HTTP_RETRY_ATTEMPTS:-4}
      REDIS_RETRY_ATTEMPTS: ${REDIS_RETRY_ATTEMPTS:-4}
      JWKS_TTL_SECONDS: ${JWKS_TTL_SECONDS:-300}
      TENANTS_DIR: /app/tenants
      AUTH_METADATA_FILE: /app/platform/published/auth/tenants.json
    # No external port: only Envoy calls auth-middleware via ext_authz on the internal network.
    # Exposing this port would allow bypassing the policy engine entirely.
    networks: [ztam]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      keycloak:
        condition: service_healthy
      opa:
        condition: service_healthy
      redis:
        condition: service_healthy

  control-plane:
    build:
      context: .
      dockerfile: platform/control-plane/Dockerfile
    environment:
      CONTROL_PLANE_DB_PATH: /data/control-plane.db
      TENANTS_DIR: /app/tenants
      PUBLISHED_DIR: /app/platform/published
      POLICIES_FILE: /app/policies/tenants.json
      ENVOY_YAML: /app/envoy/envoy.yaml
    volumes:
      - ./tenants:/app/tenants:ro
      - ./platform/published:/app/platform/published
      - ./policies:/app/policies
      - ./envoy:/app/envoy
      - control-plane-data:/data
    ports:
      - "127.0.0.1:8010:8010"
    networks: [ztam]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  envoy:
    image: envoyproxy/envoy:v1.28.7
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./envoy/certs:/etc/envoy/certs:ro
    ports:
      - "80:8080"       # HTTP  → redirects to HTTPS
      - "443:8443"      # HTTPS → all traffic, TLS terminated here
    environment:
      ENVOY_AUTH_SHARED_SECRET: ${ENVOY_AUTH_SHARED_SECRET}
    networks: [ztam]
    restart: unless-stopped
    depends_on:
      auth-middleware:
        condition: service_healthy
      testapp:
        condition: service_healthy
      testapp2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9901' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  testapp-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./demo/testapp/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - testapp-db-data:/var/lib/mysql
    networks: [ztam]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "--password=${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15

  testapp:
    build: ./demo/testapp
    # No external port: all traffic must go through Envoy (which enforces ZTAM auth).
    # Exposing port 3001 would allow unauthenticated direct access to the API.
    environment:
      DB_HOST: testapp-db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      JWT_SECRET: ${TESTAPP_JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      PORT: 3000
    volumes:
      - ./demo/testapp/backend:/app/backend
      - /app/backend/node_modules
      - ./demo/testapp/frontend:/app/frontend
    command: ["npm", "run", "dev"]
    networks: [ztam]
    restart: unless-stopped
    depends_on:
      testapp-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  testapp2-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${TESTAPP2_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: testapp2db
      MYSQL_USER: testapp2_user
      MYSQL_PASSWORD: ${TESTAPP2_DB_PASSWORD}
    volumes:
      - testapp2-db-data:/var/lib/mysql
    networks: [ztam]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "testapp2_user", "--password=${TESTAPP2_DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15

  testapp2:
    build: "../testApp2"
    environment:
      DB_HOST: testapp2-db
      DB_PORT: 3306
      DB_USER: testapp2_user
      DB_PASSWORD: ${TESTAPP2_DB_PASSWORD}
      DB_NAME: testapp2db
      APP_JWT_SECRET: ${TESTAPP2_JWT_SECRET}
      PORT: 3001
    networks: [ztam]
    restart: unless-stopped
    depends_on:
      testapp2-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3001/ 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks: [ztam]
    restart: unless-stopped
    profiles: [observability]
    depends_on:
      auth-middleware:
        condition: service_healthy
      envoy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks: [ztam]
    restart: unless-stopped
    profiles: [observability]
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  ztam:
    driver: bridge

volumes:
  pg-data:
  testapp-db-data:
  testapp2-db-data:
  prometheus-data:
  grafana-data:
  control-plane-data:
