services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${PG_PASS}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [ztam]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: start-dev
    volumes:
      - ./keycloak-db-spi/target/keycloak-db-spi.jar:/opt/keycloak/providers/keycloak-db-spi.jar
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASS}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${PG_PASS}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    # Port 8080 is kept for admin console access.
    # In production: restrict with firewall rules or put behind Envoy.
    ports:
      - "8080:8080"
    networks: [ztam]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  opa:
    image: openpolicyagent/opa:0.64.1-debug
    command: run --server --addr 0.0.0.0:8181 --watch /policies --ignore '*_test.rego'
    volumes:
      - ./policies:/policies:ro
    # No external port: OPA is reachable only from auth-middleware on the internal network.
    # Exposing OPA externally would allow anyone to query the policy engine.
    networks: [ztam]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8181/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth-middleware:
    build: ./services/auth-middleware
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      # KC_ISSUER_URL: the public-facing URL Keycloak stamps in JWT iss claims.
      # Must match KC_HOSTNAME in the keycloak service (defaults to localhost).
      KC_ISSUER_URL: http://localhost:8080
      KC_REALM: ${KC_REALM}
      KC_CLIENT_ID: ${KC_CLIENT_ID:-test-app}
      KC_CLIENT_SECRET: ${KC_CLIENT_SECRET}
      OPA_URL: http://opa:8181
      TESTAPP_JWT_SECRET: ${TESTAPP_JWT_SECRET}
    # No external port: only Envoy calls auth-middleware via ext_authz on the internal network.
    # Exposing this port would allow bypassing the policy engine entirely.
    networks: [ztam]
    restart: unless-stopped
    depends_on:
      keycloak:
        condition: service_healthy
      opa:
        condition: service_healthy

  envoy:
    image: envoyproxy/envoy:v1.28.7
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./envoy/certs:/etc/envoy/certs:ro
    ports:
      - "80:8080"       # HTTP  → redirects to HTTPS
      - "443:8443"      # HTTPS → all traffic, TLS terminated here
    networks: [ztam]
    restart: unless-stopped
    depends_on:
      auth-middleware:
        condition: service_healthy

  testapp-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./testapp/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - testapp-db-data:/var/lib/mysql
    networks: [ztam]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "--password=${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15

  testapp:
    build: ./testapp
    # No external port: all traffic must go through Envoy (which enforces ZTAM auth).
    # Exposing port 3001 would allow unauthenticated direct access to the API.
    environment:
      DB_HOST: testapp-db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      JWT_SECRET: ${TESTAPP_JWT_SECRET}
      JWT_EXPIRES_IN: 8h
      PORT: 3000
    networks: [ztam]
    restart: unless-stopped
    depends_on:
      testapp-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  ztam:
    driver: bridge

volumes:
  pg-data:
  testapp-db-data:
