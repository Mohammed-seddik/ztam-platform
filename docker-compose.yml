services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: client_app
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
      MYSQL_ROOT_PASSWORD: rootpass
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uappuser", "-papppass"]
      interval: 5s
      timeout: 5s
      retries: 20

  client-app:
    build: ./client-app
    environment:
      PORT: 3000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: client_app
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
      VERIFY_API_KEY: demo-shared-api-key
      OIDC_ISSUER: http://keycloak:8080/realms/demo-client
      OIDC_PUBLIC_ISSUER: http://localhost:8080/realms/demo-client
      OIDC_CLIENT_ID: client-demo-app
      OIDC_CLIENT_SECRET: client-demo-secret
      OIDC_REDIRECT_URI: https://localhost/oidc/callback
      SESSION_SECRET: change-me-in-real-use
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started

  keycloak:
    build: ./keycloak-spi
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    command:
      - start-dev
      - --http-port=8080
      - --import-realm
    volumes:
      - ./keycloak/realm-demo-client.json:/opt/keycloak/data/import/realm-demo-client.json:ro
      - ./keycloak/setup-realm.sh:/opt/keycloak/keycloak/setup-realm.sh:ro
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 30

  envoy:
    image: envoyproxy/envoy:v1.30-latest
    depends_on:
      client-app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./certs:/etc/envoy/certs:ro

volumes:
  postgres_data:
  mysql_data:
